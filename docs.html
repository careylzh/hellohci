<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document | HCI History</title>
    <meta name="description" content="Markdown notes for the HCI history site.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="docs">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div class="site-shell">
      <aside class="site-sidebar" aria-label="Site navigation">
        <a class="site-title" href="index.html">HCI History</a>
        <nav class="site-nav" aria-label="Pages" data-doc-nav>
          <a class="nav-link" href="index.html">Home</a>
        </nav>
      </aside>

      <div class="site-frame">
        <header class="topbar">
          <a class="mobile-brand" href="index.html">HCI History</a>
          <div class="topbar-actions">
            <label class="toggle-control">
              <input id="raw-toggle" type="checkbox">
              <span>Raw Markdown</span>
            </label>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to original theme">Original</button>
          </div>
        </header>

        <main id="main-content" class="content-shell">
          <article class="doc-panel" aria-live="polite">
            <header class="doc-header">
              <p class="eyebrow">Markdown page</p>
              <h1 id="doc-title">Loading</h1>
            </header>
            <div id="doc-rendered" class="markdown-body"></div>
            <pre id="doc-raw" class="raw-markdown" hidden></pre>
          </article>
        </main>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
